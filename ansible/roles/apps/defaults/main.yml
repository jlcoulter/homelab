---
# Apps role defaults
apps_base_dir: /opt
apps_managed_apps:
  - adguard
  - adguard-sync
  - traefik
  - homepage
  - gitea
apps_config_map:
  homepage:
    config_dir: /mnt/docker_data/homepage/config
    files:
      - settings.yaml
      - services.yaml
      - docker.yaml
      - bookmarks.yaml
      - proxmox.yaml
  traefik:
    config_dir: /etc/traefik
    files:
      - dynamic.yml
